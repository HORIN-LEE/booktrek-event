<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>신청 완료 | Page of us</title>
  <meta name="description" content="Page of us 참여 신청이 완료되었습니다.">
  <style>
    :root {
      --navy: #08286e;
      --ink: #111827;
      --muted: #5d6675;
      --paper: #f7f7f3;
      --white: #ffffff;
      --line: #cfd7e4;
      font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(23, 70, 143, .08), transparent 24rem),
        linear-gradient(180deg, #fbfbf8, var(--paper));
      line-height: 1.6;
    }

    main {
      width: min(640px, 100%);
      padding: 42px 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 20px 50px rgba(8, 40, 110, .14);
      text-align: center;
    }

    .label {
      color: var(--navy);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 12px;
      color: var(--navy);
      font-size: clamp(34px, 7vw, 54px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    p {
      margin: 0 auto;
      max-width: 480px;
      color: var(--muted);
      font-size: 18px;
      word-break: keep-all;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    a {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border-radius: 8px;
      border: 1px solid var(--navy);
      color: var(--navy);
      font-weight: 900;
      text-decoration: none;
    }

    a.primary {
      background: var(--navy);
      color: var(--white);
    }
  </style>
</head>
<body>
  <main>
    <div class="label">Application Sent</div>
    <h1>신청이 완료되었습니다.</h1>
    <p>
      신청 내용을 확인한 뒤 행사 안내와 참여 가능 여부를 연락드릴게요.
      함께 만들어갈 페이지를 기대하고 있겠습니다.
    </p>
    <div class="actions">
      <a class="primary" href="/">홈으로 돌아가기</a>
      <a href="/#apply">신청서 다시 보기</a>
    </div>
  </main>
</body>
</html>
